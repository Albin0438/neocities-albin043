<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">

        <title>Login</title>
        <link rel="icon" href="favicon/icons8-favicon-48.png">
        <link rel="stylesheet" href="style.css">
    </head>

    <body>

        <header>
        <div class="logo"><a href="../index.html">Albin</a></div>

        <nav>
            <a href="index.html">Home</a>
            <a href="registration.html">Registration</a>
            <a href="projects.html">Projects</a>
            <a href="blog.html" class="active">Blog</a>
            <a href="uses.html">Uses</a>
            <a href="links.html">Links</a>
            <a href="contact.html">Contact</a>
        </nav>
        </header>

        <div class="wrapper">
            <form onsubmit="handleLogin(event)">

                <h1>Login</h1> 
                <div class="input-box">
                    <input type="text" placeholder="username" required>
                </div>

                <div class="input-box">
                    <input type="password" placeholder="password" required>
                    <button type="button" class="toggle-password" onclick="togglePasswordVisibility('password')">👁️</button>
                </div>

                <div class="remember-forgot">
                    <label><input type="checkbox">remember me</label>
                    <a href="#">forgot password?</a>
                </div>

                <button type="submit" class="btn">login</button>

                <div class="register-link">
                    Don't have an account? 
                    <a href="registration.html">register here</a>
                </div>

            </form>
        </div>
        <script src="js/script.js"></script>
    </body>
</html>
