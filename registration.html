<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Registration</title>
        <link rel="icon" href="favicon/icons8-favicon-48.png">
        <link rel="stylesheet" href="style.css">
    </head>

    <body>

        <header>
        <div class="logo"><a href="../index.html">Albin</a></div>

        <nav>
            <a href="index.html">Home</a>
            <a href="login.html">Login</a>
            <a href="projects.html">Projects</a>
            <a href="blog.html" class="active">Blog</a>
            <a href="uses.html">Uses</a>
            <a href="links.html">Links</a>
            <a href="contact.html">Contact</a>
        </nav>
        </header>

        <div class="wrapper">
            <form onsubmit="handleRegistration(event)">

                <h1>Registration</h1>
                <div class="input-box">
                    <input type="text" placeholder="username" required>
                </div>
                <div class="input-box">
                    <input type="email" placeholder="email" required>
                </div>
                <div class="input-box password-container">
                    <input 
                        type="password" 
                        id="password"
                        placeholder="new password" 
                        minlength="15"
                        pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z])(?=.*[\W_]).{15,}"
                        title="Password must be at least 15 characters long and include uppercase and lowercase letters, a number, and a special character."
                        required
                    >
                    <button type="button" class="toggle-password" onclick="togglePasswordVisibility('password')">👁️</button>
                </div>

                <div class="input-box password-container">
                    <input 
                        type="password" 
                        id="confirm-password"
                        placeholder="retype new password" 
                        minlength="15"
                        required
                    >
                    <button type="button" class="toggle-password" onclick="togglePasswordVisibility('confirm-password')">👁️</button>
                </div>

                <div class="registration-actions">
                    <button type="reset" class="btn">reset</button>
                    <button type="submit" class="btn btn-outline">register</button>
                </div>

                <div class="login-link">
                    Already have an account? <a href="login.html">login here</a>
                </div>

            </form>
        </div>
        <script src="js/script.js"></script>
    </body>
</html>
