<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Generator</title>

  <link rel="icon" href="../favicon/icons8-favicon-48.png">
  
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../css/tools.css">

  </head>
<body>

<header>
  <div class="logo"><a href="../index.html">Albin</a></div>

  <nav>
    <a href="../index.html" class="active">Home</a>
    <a href="../projects.html">Projects</a>
    <a href="../blog.html">Blog</a>
    <a href="../uses.html">Uses</a>
    <a href="../links.html">Links</a>
    <a href="../tools.html">Toolkit</a>
    <a href="../contact.html">Contact</a>
  </nav>
</header>

<main class="tool-container">
  <a href="../index.html">← Back to Home</a>

  <!-- Length -->
  <label>Password Length</label>
  <input 
    type="number" 
    id="length" 
    value="12" 
    min="1" 
    max="260"
    placeholder="Enter length"
  >

  <small id="lengthMessage" style="display:block; margin-bottom:10px; color:#94a3b8;">
    Recommended: 8–128 characters
  </small>

  <!-- Options -->
  <div class="options">
    <label class="option">
      <input type="checkbox" id="uppercase" checked>
      <span>Uppercase (A-Z)</span>
    </label>

    <label class="option">
      <input type="checkbox" id="lowercase" checked>
      <span>Lowercase (a-z)</span>
    </label>

    <label class="option">
      <input type="checkbox" id="numbers" checked>
      <span>Numbers (0-9)</span>
    </label>

    <label class="option">
      <input type="checkbox" id="symbols">
      <span>Symbols (!@#...)</span>
    </label>

    <label class="option">
      <input type="checkbox" id="noSimilar">
      <span>Avoid similar (l,1,O)</span>
    </label>
  </div>

  <button onclick="generatePassword()">Generate</button>

  <!-- Output -->
  <div class="output">
    <textarea id="passwordOutput" readonly></textarea>
  </div>

  <button onclick="copyPassword()">Copy</button>
</main>

</footer>

</body>
</html>
