<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Random Number Generator</title>

  <link rel="icon" href="../favicon/icons8-favicon-48.png">
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../css/tools.css">

  </head>

<body>

<header>
  <div class="logo"><a href="../index.html">Albin</a></div>

  <nav>
    <a href="../index.html" class="active">Home</a>
    <a href="../projects.html">Projects</a>
    <a href="../blog.html">Blog</a>
    <a href="../uses.html">Uses</a>
    <a href="../links.html">Links</a>
    <a href="../tools.html">Toolkit</a>
    <a href="../contact.html">Contact</a>
  </nav>
</header>

<div class="tool-container">
  <a href="../index.html" class="back-link">← Back</a>

  <label for="min">Minimum</label>
  <input type="number" id="min" value="1" placeholder="Min value">

  <label for="max">Maximum</label>
  <input type="number" id="max" value="100" placeholder="Max value">

  <!-- Main buttons -->
  <div class="button-group">
    <button onclick="generateNumber()">Generate</button>
    <button onclick="copyResult()">Copy</button>
  </div>

  <!-- Presets -->
  <div class="button-group">
    <button onclick="setRange(1,10)">1–10</button>
    <button onclick="setRange(1,100)">1–100</button>
    <button onclick="setRange(1,1000)">1–1000</button>
  </div>

  <!-- No repeat option -->
  <label class="option">
    <input type="checkbox" id="noRepeat">
    No repeat mode
  </label>

  <button onclick="resetNumbers()">Reset</button>

  <!-- Output -->
  <div class="output">
    <p id="randomResult">Generate a number 🔢</p>
  </div>
</div>

<footer>
  <hr>

  <div class="footer-icons">
    <a href="https://github.com/Albin0438" target="_blank">GitHub</a>

  </div>

</footer>

<script src="../tools.js"></script>
<script src="../js/random-number.js"></script>

</body>
</html>
